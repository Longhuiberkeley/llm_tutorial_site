<div class="bg-surface-container-low rounded-xl p-8 mb-8 max-w-3xl mx-auto shadow-sm">
    <div class="text-center mb-8">
        <h3 class="text-xl font-bold font-headline mb-1">Temperature: Creativity vs. Reliability</h3>
        <p class="text-sm text-on-surface-variant">Prompt: <em>"Complete this sentence: The sky is..."</em></p>
    </div>

    <!-- Slider -->
    <div class="mb-8 px-4">
        <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-3">
            <span>❄️ Factual</span>
            <span>🔥 Creative</span>
        </div>
        <input type="range" id="temp-slider" min="0" max="3" value="0" step="1"
            class="w-full h-3 rounded-full appearance-none cursor-pointer accent-primary"
            style="background: linear-gradient(to right, #5B8DB8, var(--accent), var(--error));"
            oninput="updateTemp(this.value)">
        <div class="flex justify-between px-1 mt-2 text-[10px] font-bold text-on-surface-variant opacity-60 uppercase tracking-wider">
            <span>0.0</span>
            <span>0.5</span>
            <span>1.0</span>
            <span>2.0</span>
        </div>
    </div>

    <!-- Output cards -->
    <div id="temp-cards" class="space-y-3">
        <!-- Populated by JS -->
    </div>

    <!-- Label badge -->
    <div class="text-center mt-6">
        <span id="temp-badge" class="px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest"></span>
    </div>
</div>

<script>
(function() {
    var levels = [
        {
            label: 'Deterministic',
            badge: '🔒 Always picks #1 most likely word',
            badgeColor: '#5B8DB8',
            outputs: [
                { text: 'The sky is <strong>blue.</strong>', weight: '97%' },
                { text: 'The sky is <strong>clear.</strong>', weight: '2%' },
                { text: 'The sky is <strong>overcast.</strong>', weight: '1%' }
            ],
            note: 'Best for: code, data extraction, factual Q&A'
        },
        {
            label: 'Balanced',
            badge: '⚖️ Small amount of variety',
            badgeColor: 'var(--success)',
            outputs: [
                { text: 'The sky is <strong>a brilliant cerulean blue.</strong>', weight: '45%' },
                { text: 'The sky is <strong>painted in shades of gold and pink.</strong>', weight: '30%' },
                { text: 'The sky is <strong>covered in soft, cotton-candy clouds.</strong>', weight: '25%' }
            ],
            note: 'Best for: writing, summaries, chatbots'
        },
        {
            label: 'Creative',
            badge: '✨ Full creative range',
            badgeColor: 'var(--accent)',
            outputs: [
                { text: 'The sky is <strong>a canvas God forgot to finish.</strong>', weight: '33%' },
                { text: 'The sky is <strong>dreaming of itself in every puddle.</strong>', weight: '33%' },
                { text: 'The sky is <strong>the last thing the birds remember.</strong>', weight: '34%' }
            ],
            note: 'Best for: poetry, brainstorming, creative writing'
        },
        {
            label: 'Chaotic',
            badge: '⚠️ May produce gibberish',
            badgeColor: 'var(--error)',
            outputs: [
                { text: 'The sky is <strong>tremendously the what a bloop.</strong>', weight: '??%' },
                { text: 'The sky is <strong>purple elephant Thursday cheese.</strong>', weight: '??%' },
                { text: 'The sky is <strong>is is the sky the is.</strong>', weight: '??%' }
            ],
            note: 'Avoid: outputs become unpredictable and incoherent'
        }
    ];

    function render(idx) {
        var d = levels[idx];
        var cards = document.getElementById('temp-cards');
        cards.innerHTML = '';

        d.outputs.forEach(function(o, i) {
            var delay = i * 100;
            var div = document.createElement('div');
            div.className = 'flex items-center gap-4 bg-surface-container-lowest border border-outline-variant rounded-xl px-5 py-4 text-sm transition-all';
            div.style.animationDelay = delay + 'ms';
            div.innerHTML =
                '<div class="text-2xl">' + (i === 0 ? '🎲' : i === 1 ? '🎲' : '🎲') + '</div>' +
                '<div class="flex-grow">' + o.text + '</div>' +
                '<div class="text-xs font-bold text-on-surface-variant shrink-0">' + o.weight + '</div>';
            cards.appendChild(div);
        });

        var badge = document.getElementById('temp-badge');
        badge.textContent = d.badge;
        badge.style.backgroundColor = 'color-mix(in srgb, ' + d.badgeColor + ' 15%, var(--surface-container-lowest))';
        badge.style.color = d.badgeColor;
        badge.style.border = '1px solid ' + d.badgeColor;
    }

    window.updateTemp = function(val) {
        render(parseInt(val));
    };

    render(0);
})();
</script>
