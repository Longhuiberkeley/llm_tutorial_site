<div class="bg-surface-container-low rounded-xl p-8 mb-8 text-center">
    <div class="flex items-center justify-center gap-3 mb-6">
        <span class="text-3xl">🧠</span>
        <h3 class="text-xl font-bold font-headline">Find the Odd One Out</h3>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-2xl mx-auto">
        <div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-6 hover:border-primary cursor-pointer transition-all hover:scale-105" onclick="this.classList.add('border-red-500', 'bg-red-50'); document.getElementById('iq-words-feedback').classList.remove('hidden')">
            <div class="text-4xl mb-2">🍎</div>
            <div class="font-bold">Apple</div>
        </div>
        <div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-6 hover:border-primary cursor-pointer transition-all hover:scale-105" onclick="this.classList.add('border-red-500', 'bg-red-50'); document.getElementById('iq-words-feedback').classList.remove('hidden')">
            <div class="text-4xl mb-2">🍌</div>
            <div class="font-bold">Banana</div>
        </div>
        <div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-6 hover:border-primary cursor-pointer transition-all hover:scale-105" onclick="this.classList.add('border-red-500', 'bg-red-50'); document.getElementById('iq-words-feedback').classList.remove('hidden')">
            <div class="text-4xl mb-2">🍊</div>
            <div class="font-bold">Orange</div>
        </div>
        <div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-6 hover:border-primary cursor-pointer transition-all hover:scale-105 group" onclick="this.classList.add('border-green-500', 'bg-green-50'); this.querySelector('.correct-check').classList.remove('hidden'); document.getElementById('iq-words-feedback').classList.remove('hidden')">
            <div class="text-4xl mb-2">🐕</div>
            <div class="font-bold">Dog</div>
            <div class="correct-check hidden text-green-600 font-bold mt-2 text-sm">✅ Correct!</div>
        </div>
    </div>
    <p id="iq-words-feedback" class="mt-6 text-on-surface-variant italic hidden animate-fade-in">"Dog" is far away from the others in meaning-space!</p>
</div>
