<div id="attn-wrap" class="bg-surface-container-low rounded-xl p-8 mb-8 max-w-3xl mx-auto shadow-sm" style="position: relative;">
    <!-- SVG overlay — arrows drawn here dynamically -->
    <svg id="attn-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:5;"></svg>

    <div class="text-center mb-8" style="position:relative;z-index:10;">
        <span class="text-3xl block mb-2">👀</span>
        <h3 class="text-xl font-bold font-headline">Hover over "bank" to reveal attention</h3>
        <p class="text-sm text-on-surface-variant italic">Same word — different meaning based on context</p>
    </div>

    <!-- Sentence 1: Nature context -->
    <div class="mb-8 p-6 bg-surface-container-lowest rounded-xl border border-outline-variant" style="position:relative;z-index:10;">
        <p class="text-xs text-on-surface-variant mb-5 font-bold uppercase tracking-widest opacity-50">Context: Nature</p>
        <div class="flex flex-wrap justify-center gap-4 text-xl sm:text-2xl font-bold">
            <span class="attn-word px-2 py-1 rounded" id="s1-the">The</span>
            <span class="attn-word px-2 py-1 rounded text-primary font-extrabold" id="s1-river">river</span>
            <span id="s1-bank"
                  class="attn-focus px-3 py-1 rounded-lg border-2 border-primary bg-primary/10 cursor-pointer transition-all"
                  onmouseenter="showAttention('s1')"
                  onmouseleave="hideAttention()">bank</span>
            <span class="attn-word px-2 py-1 rounded" id="s1-is">is</span>
            <span class="attn-word px-2 py-1 rounded" id="s1-flooded">flooded.</span>
        </div>
        <div id="s1-hint" class="mt-5 text-sm text-primary font-bold text-center opacity-0 transition-opacity duration-200">
            "bank" → 85% attention to "river" — it's a nature bank!
        </div>
    </div>

    <!-- Sentence 2: Finance context -->
    <div class="p-6 bg-surface-container-lowest rounded-xl border border-outline-variant" style="position:relative;z-index:10;">
        <p class="text-xs text-on-surface-variant mb-5 font-bold uppercase tracking-widest opacity-50">Context: Finance</p>
        <div class="flex flex-wrap justify-center gap-4 text-xl sm:text-2xl font-bold">
            <span class="attn-word px-2 py-1 rounded" id="s2-the">The</span>
            <span class="attn-word px-2 py-1 rounded font-extrabold" style="color:var(--accent);" id="s2-financial">financial</span>
            <span id="s2-bank"
                  class="attn-focus px-3 py-1 rounded-lg border-2 cursor-pointer transition-all"
                  style="border-color:var(--accent);background-color:color-mix(in srgb, var(--accent) 12%, transparent);"
                  onmouseenter="showAttention('s2')"
                  onmouseleave="hideAttention()">bank</span>
            <span class="attn-word px-2 py-1 rounded" id="s2-is">is</span>
            <span class="attn-word px-2 py-1 rounded" id="s2-closed">closed.</span>
        </div>
        <div id="s2-hint" class="mt-5 text-sm font-bold text-center opacity-0 transition-opacity duration-200" style="color:var(--accent);">
            "bank" → 92% attention to "financial" — it's a money bank!
        </div>
    </div>
</div>

<script>
(function() {
    // Attention data: focus word → [{targetId, weight, color}]
    var attentionData = {
        s1: {
            focusId: 's1-bank',
            color: 'var(--primary)',
            hintId: 's1-hint',
            words: [
                { id: 's1-the',     weight: 0.05 },
                { id: 's1-river',   weight: 0.85 },
                { id: 's1-is',      weight: 0.05 },
                { id: 's1-flooded', weight: 0.05 }
            ]
        },
        s2: {
            focusId: 's2-bank',
            color: 'var(--accent)',
            hintId: 's2-hint',
            words: [
                { id: 's2-the',       weight: 0.04 },
                { id: 's2-financial', weight: 0.92 },
                { id: 's2-is',        weight: 0.02 },
                { id: 's2-closed',    weight: 0.02 }
            ]
        }
    };

    function getCenter(el, containerRect) {
        var r = el.getBoundingClientRect();
        return {
            x: r.left + r.width / 2 - containerRect.left,
            y: r.top + r.height / 2 - containerRect.top
        };
    }

    window.showAttention = function(sentenceKey) {
        var data = attentionData[sentenceKey];
        var container = document.getElementById('attn-wrap');
        var svg = document.getElementById('attn-svg');
        var containerRect = container.getBoundingClientRect();
        var focus = document.getElementById(data.focusId);
        var from = getCenter(focus, containerRect);

        svg.innerHTML = '';

        data.words.forEach(function(w) {
            var el = document.getElementById(w.id);
            var to = getCenter(el, containerRect);

            // Arc control point: midpoint lifted upward
            var mx = (from.x + to.x) / 2;
            var lift = 40 + w.weight * 30;
            var my = Math.min(from.y, to.y) - lift;

            var strokeWidth = Math.max(1.5, w.weight * 12);
            var opacity = Math.max(0.15, w.weight * 1.1);

            var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', 'M ' + from.x + ',' + from.y + ' Q ' + mx + ',' + my + ' ' + to.x + ',' + to.y);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', data.color);
            path.setAttribute('stroke-width', strokeWidth);
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('opacity', opacity);
            svg.appendChild(path);
        });

        document.getElementById(data.hintId).style.opacity = '1';
    };

    window.hideAttention = function() {
        document.getElementById('attn-svg').innerHTML = '';
        document.getElementById('s1-hint').style.opacity = '0';
        document.getElementById('s2-hint').style.opacity = '0';
    };
})();
</script>
