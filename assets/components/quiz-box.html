<!--
Quiz Box Component
Usage: Include this HTML where you need a quiz
-->
<div class="bg-[#F9F9F9] border border-outline-variant rounded-xl p-6 mt-10">
    <div class="font-bold mb-4 flex items-center gap-2">
        <span>🧠</span>
        <span>QUIZ</span>
    </div>
    <p class="mb-4">
        <!-- Your question here -->
    </p>
    <div class="space-y-2">
        <!-- Quiz options - example:
        <div class="quiz-option bg-white border border-outline-variant p-3 rounded-lg cursor-pointer hover:border-primary transition-all" data-correct="false">
            A) Option text
        </div>
        -->
    </div>
    <div class="quiz-feedback hidden mt-4 p-4 rounded-lg">
        <!-- Feedback will be shown here -->
    </div>
</div>
