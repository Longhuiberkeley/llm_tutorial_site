<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{{TITLE}} - LLM Tutorial</title>
    <script src="../js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/main.css"/>
    <link rel="stylesheet" href="../css/animations.css"/>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
    <!-- TopNavBar -->
    <nav class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md shadow-[0_20px_40px_rgba(146,74,49,0.06)] flex justify-between items-center px-8 py-4 max-w-full">
        <a href="../index.html" class="flex items-center gap-2 text-xl font-bold text-on-surface tracking-tighter font-headline hover:text-accent transition-colors group">
            <span class="material-symbols-outlined text-accent opacity-0 group-hover:opacity-100 transition-opacity">home</span>
            LLM Tutorial
        </a>
        <div class="flex items-center gap-6">
            <a class="font-headline font-semibold text-sm tracking-tight text-on-surface opacity-70 hover:opacity-100 hover:text-accent transition-all" href="../pages/about.html">About</a>
        </div>
    </nav>

    <div class="flex pt-16 min-h-screen">
        <!-- SideNavBar -->
        <aside class="sidebar hidden lg:flex w-64 fixed left-0 top-0 pt-20 bg-surface-container-low flex flex-col gap-2 p-4 z-40">
            <div class="mb-6 px-2">
                <h2 class="text-lg font-bold text-on-surface font-headline">Curriculum</h2>
                <p class="text-xs text-on-surface-variant font-medium uppercase tracking-wider">LLM Mastery Series</p>
            </div>
            <nav class="flex flex-col gap-1 overflow-y-auto max-h-[calc(100vh-160px)]">
                {{TOC_SIDEBAR}}
            </nav>
        </aside>

        <!-- Main Content Canvas -->
        <main class="lg:ml-64 w-full px-6 md:px-12 py-16 max-w-5xl">
            <header class="mb-12 fade-in">
                <nav class="flex items-center gap-2 text-primary font-bold text-sm mb-4">
                    <a href="../index.html" class="hover:underline">Overview</a>
                    <span class="material-symbols-outlined text-xs">chevron_right</span>
                    <span>{{CHAPTER_TITLE}}</span>
                </nav>
                <h1 class="text-4xl md:text-5xl font-extrabold font-headline tracking-tighter text-on-surface mb-6">
                    {{TITLE}}
                </h1>
                <p class="text-xl text-on-surface-variant max-w-2xl font-medium leading-relaxed">
                    {{DESCRIPTION}}
                </p>
            </header>

            <div class="content-body space-y-12">
                {{CONTENT}}
            </div>

            <!-- Quiz Section (if present) -->
            {{QUIZ_SECTION}}

            <!-- Navigation -->
            <nav class="flex justify-between items-center pt-8 mt-20 border-t border-outline-variant/20">
                <div class="prev-link">
                    {{PREV_LINK}}
                </div>
                <div class="next-link">
                    {{NEXT_LINK}}
                </div>
            </nav>
        </main>
    </div>

    <!-- Footer -->
    <footer class="w-full py-12 mt-20 bg-background border-t border-outline-variant/10 flex flex-col items-center justify-center gap-4 text-center">
        <p class="font-label text-xs uppercase tracking-widest text-on-surface opacity-40">© 2026 LLM Tutorial. Built with 🧠.</p>
    </footer>

    <!-- Load scripts -->
    <script src="../js/main.js"></script>
    <script src="../js/quizzes.js"></script>
    {{INTERACTIVE_SCRIPTS}}
</body>
</html>
